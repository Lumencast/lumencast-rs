name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish lumencast-protocol
        run: cargo publish -p lumencast-protocol --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: cargo publish lumencast-server
        run: cargo publish -p lumencast-server --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
